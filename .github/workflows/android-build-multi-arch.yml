name: Android Multi-Arch AAR Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-aar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and CMake
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "ndk;27.1.12297006" "cmake;3.30.5"

      - name: Build release AAR (all ABIs)
        run: ./gradlew --no-daemon :library:assembleRelease

      - name: Validate native libraries in AAR
        run: |
          AAR="library/build/outputs/aar/library-release.aar"
          test -f "$AAR"

          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            for lib in libbz2.so librocksdb.so librocksdbjni.so liblz4.so libsnappy.so libzstd.so; do
              unzip -l "$AAR" "jni/$abi/$lib" | grep -q "$lib"
            done
          done

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocksdb-android-multi-arch-aar
          path: library/build/outputs/aar/library-release.aar
          if-no-files-found: error
